# ADA v2 Minimal Core
# Base: Ollama (gratis, local). Máximo uso de local; Gemini (pago) solo si use_advanced_brain=true o se necesita más.
#
# Servicios que arrancan con "docker compose up -d" (sin perfiles):
#   - postgres, ada_core, memory_service, chat_interface
# Servicios con perfil (no arrancan por defecto):
#   - chat-bridge (perfil "telegram"): docker compose --profile telegram up -d
# Si ves más contenedores, comprueba que no tengas COMPOSE_PROFILES en el entorno.
# Ollama corre en el host (Mac), no en Docker.
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: ada_postgres
    environment:
      POSTGRES_USER: ${PG_USER:-ada_user}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-supersecret}
      POSTGRES_DB: ${PG_DB:-ada_main}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/schemas:/docker-entrypoint-initdb.d
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER:-ada_user} -d ${PG_DB:-ada_main}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  ada_core:
    build: ./agent-core
    container_name: ada_core
    env_file: ada_resources.env
    # Cerebro base: Ollama (OLLAMA_URL al host). Gemini opcional con GEMINI_API_KEY + use_advanced_brain.
    environment:
      MEMORY_URL: http://memory_service:3005
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-ada_user}
      PG_PASSWORD: ${PG_PASSWORD:-supersecret}
      PG_DB: ${PG_DB:-ada_main}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434/api/generate}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3:8b}
      OLLAMA_FALLBACK_MODEL: ${OLLAMA_FALLBACK_MODEL:-qwen2:7b}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-}
      OLLAMA_CHAT_TIMEOUT: ${OLLAMA_CHAT_TIMEOUT:-180}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      MOLTBOT_URL: ${MOLTBOT_URL:-http://moltbot:3010/execute}
      ADA_EMAIL: ${ADA_EMAIL:-}
      ADA_EMAIL_PASSWORD: ${ADA_EMAIL_PASSWORD:-}
      ADA_ENV: ${ADA_ENV:-development}
      CHAT_BRIDGE_URL: ${CHAT_BRIDGE_URL:-http://chat-bridge:8081}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ADA_WORKSPACE: ${ADA_WORKSPACE:-/workspace}
      ADA_PROJECTS_ROOT: ${ADA_PROJECTS_ROOT:-/dockers}
      ADA_ALLOW_RUN_COMMAND: ${ADA_ALLOW_RUN_COMMAND:-}
      ADA_RUN_COMMAND_ALLOWLIST: ${ADA_RUN_COMMAND_ALLOWLIST:-}
      ADA_RUN_COMMAND_TIMEOUT: ${ADA_RUN_COMMAND_TIMEOUT:-60}
      ADA_SCHEDULER_INTERVAL_SEC: ${ADA_SCHEDULER_INTERVAL_SEC:-3600}
    ports:
      - "3001:3001"
    volumes:
      - ./agent-core/src:/app
      - ./agent-core/ada_core:/app/ada_core
      - .:/workspace
      - ${ADA_PROJECTS_PATH:-/Volumes/Datos/dockers}:/dockers
    depends_on:
      postgres:
        condition: service_healthy
      memory_service:
        condition: service_started

  memory_service:
    build: ./memory-db
    container_name: ada_memory_service
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-ada_user}
      PG_PASSWORD: ${PG_PASSWORD:-supersecret}
      PG_DB: ${PG_DB:-ada_main}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3005:3005"

  chat_interface:
    build: ./web-admin
    container_name: ada_chat_interface
    environment:
      AGENT_URL: http://ada_core:3001
      MEMORY_URL: http://memory_service:3005
      # Raíz del explorador de archivos (ruta dentro del contenedor). Debe coincidir con el volumen /dockers.
      ADA_FILES_ROOT: /dockers
      # Permitir crear/editar archivos desde la interfaz en esa raíz (1 = sí).
      ENABLE_AGENT_FS: ${ENABLE_AGENT_FS:-1}
    depends_on:
      - ada_core
      - memory_service
    ports:
      - "8080:8080"
    volumes:
      - ./web-admin/src:/app
      - ./web-admin/frontend/dist:/frontend/dist
      # Directorio que el usuario asignó (p. ej. /Volumes/Datos/dockers) para que ARCHIVOS liste sus proyectos
      - ${ADA_PROJECTS_PATH:-/Volumes/Datos/dockers}:/dockers

  chat-bridge:
    build: ./chat-bridge
    container_name: ada_chat_bridge
    environment:
      AGENT_URL: http://ada_core:3001
      MEMORY_URL: http://memory_service:3005
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    depends_on:
      - ada_core
    ports:
      - "8081:8081"
    profiles:
      - telegram

