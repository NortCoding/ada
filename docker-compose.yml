# ADA v1 — núcleo mínimo
# Arranque: docker compose up -d
#
# Servicios activos: postgres, memory_service, agent-core, chat_interface
# Ollama en el host (p. ej. host.docker.internal:11434).
#
# Servicios históricos (telegram, orchestrator, task-runner, etc.):
#   docker compose -f docker-compose.yml -f docker-compose.legacy.yml --profile telegram up -d
#   docker compose -f docker-compose.yml -f docker-compose.legacy.yml --profile legacy up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: ada_postgres
    environment:
      POSTGRES_USER: ${PG_USER:-ada_user}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-supersecret}
      POSTGRES_DB: ${PG_DB:-ada_main}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/schemas:/docker-entrypoint-initdb.d
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER:-ada_user} -d ${PG_DB:-ada_main}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  agent-core:
    build: ./agent-core
    container_name: ada_core
    env_file: ada_resources.env
    environment:
      MEMORY_URL: http://memory_service:3005
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-ada_user}
      PG_PASSWORD: ${PG_PASSWORD:-supersecret}
      PG_DB: ${PG_DB:-ada_main}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434/api/generate}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_FALLBACK_MODEL: ${OLLAMA_FALLBACK_MODEL:-qwen2:7b}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-}
      OLLAMA_CHAT_TIMEOUT: ${OLLAMA_CHAT_TIMEOUT:-180}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      ADA_ENV: ${ADA_ENV:-development}
      ADA_WORKSPACE: ${ADA_WORKSPACE:-/workspace}
      ADA_PROJECTS_ROOT: ${ADA_PROJECTS_ROOT:-/dockers}
      ADA_V1_STRICT: ${ADA_V1_STRICT:-0}
      ADA_ALLOW_RUN_COMMAND: ${ADA_ALLOW_RUN_COMMAND:-1}
      ADA_RUN_COMMAND_ALLOWLIST: ${ADA_RUN_COMMAND_ALLOWLIST:-}
      ADA_RUN_COMMAND_TIMEOUT: ${ADA_RUN_COMMAND_TIMEOUT:-60}
    ports:
      - "3001:3001"
    volumes:
      - ./agent-core/src:/app
      - ./agent-core/ada_core:/app/ada_core
      - .:/workspace
      - ${ADA_PROJECTS_PATH:-/Volumes/Datos/dockers}:/dockers
    depends_on:
      postgres:
        condition: service_healthy
      memory_service:
        condition: service_started

  memory_service:
    build: ./memory-db
    container_name: ada_memory_service
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-ada_user}
      PG_PASSWORD: ${PG_PASSWORD:-supersecret}
      PG_DB: ${PG_DB:-ada_main}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3005:3005"

  chat_interface:
    build: ./web-admin
    container_name: ada_chat_interface
    environment:
      AGENT_URL: http://agent-core:3001
      MEMORY_URL: http://memory_service:3005
      ADA_FILES_ROOT: /dockers
      ENABLE_AGENT_FS: ${ENABLE_AGENT_FS:-1}
    depends_on:
      - agent-core
      - memory_service
    ports:
      - "8080:8080"
    volumes:
      - ./web-admin/src:/app
      - ./web-admin/frontend-v1/dist:/frontend/v1/dist
      - ./web-admin/frontend/dist:/frontend/legacy/dist
      - ${ADA_PROJECTS_PATH:-/Volumes/Datos/dockers}:/dockers

volumes:
  pg-data:
